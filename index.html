    function drawCertificate() {
      const canvas = document.getElementById('cb-cert-canvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;

      // Background gradient
      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, '#0d2b0d');
      bg.addColorStop(1, '#1a4f1a');
      ctx.fillStyle = bg;
      ctx.roundRect(0, 0, W, H, 20); ctx.fill();

      // Outer border
      ctx.strokeStyle = '#b8e986'; ctx.lineWidth = 4;
      ctx.roundRect(8, 8, W-16, H-16, 14); ctx.stroke();

      // Inner decorative border
      ctx.strokeStyle = 'rgba(184,233,134,0.25)'; ctx.lineWidth = 1;
      ctx.roundRect(18, 18, W-36, H-36, 10); ctx.stroke();

      // C badge
      ctx.fillStyle = '#b8e986';
      ctx.beginPath(); ctx.arc(W/2, 68, 34, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0d2b0d';
      ctx.font = 'bold 42px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('C', W/2, 70);

      // CRIMEBUSTERS
      ctx.fillStyle = '#b8e986';
      ctx.font = 'bold 20px Arial'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('CRIMEBUSTERS', W/2, 122);

      // Subtitle
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = '12px Arial';
      ctx.fillText('CERTIFICATE OF ACHIEVEMENT', W/2, 144);

      // Divider
      ctx.strokeStyle = 'rgba(184,233,134,0.35)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(60, 156); ctx.lineTo(W-60, 156); ctx.stroke();

      // This certifies that
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = '13px Arial';
      ctx.fillText('This certifies that', W/2, 182);

      // Player name
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 30px Arial';
      ctx.fillText(playerName, W/2, 216);

      // has completed
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '13px Arial';
      ctx.fillText('has completed the Cybersecurity Challenge', W/2, 236);
      ctx.fillStyle = '#b8e986';
      ctx.font = 'bold 12px Arial';
      ctx.fillText('LEVEL 1  +  LEVEL 2', W/2, 254);

      // Score badge — average both levels
      const avgScore = level1Score > 0
        ? Math.round((level1Score + lastScore) / 2)
        : Math.round(lastScore);
      const grade = avgScore >= 80 ? '⭐ Expert CrimeBuster'
                  : avgScore >= 55 ? '🔍 Junior CrimeBuster'
                  :                  '🛡️ CrimeBuster Trainee';

      ctx.fillStyle = 'rgba(184,233,134,0.15)';
      ctx.roundRect(W/2-140, 266, 280, 52, 10); ctx.fill();
      ctx.strokeStyle = 'rgba(184,233,134,0.4)'; ctx.lineWidth = 1;
      ctx.roundRect(W/2-140, 266, 280, 52, 10); ctx.stroke();

      ctx.fillStyle = '#b8e986';
      ctx.font = 'bold 16px Arial';
      ctx.fillText(`Combined Score: ${avgScore} pts`, W/2, 284);
      ctx.font = '12px Arial';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText(`Lvl 1: ${Math.round(level1Score)} pts  •  Lvl 2: ${Math.round(lastScore)} pts`, W/2, 299);
      ctx.fillStyle = '#b8e986';
      ctx.font = '13px Arial';
      ctx.fillText(grade, W/2, 312);

      // Date
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '11px Arial';
      const date = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
      ctx.fillText(date, W/2, 338);

      ctx.fillStyle = 'rgba(184,233,134,0.45)';
      ctx.font = '10px Arial';
      ctx.fillText('crimebusters.app', W/2, 356);
    }
